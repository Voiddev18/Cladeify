<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cladeify - Taxon Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --bg2: #16191f;
            --text: #f0f4f8;
            --text3: #75869c;
            --accent: #5eb0f9;
            --border: rgba(94, 176, 249, 0.15);
            --border-gradient: linear-gradient(45deg, #5eb0f9, #3a7ecd, #a3d4ff);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(94, 176, 249, 0.03) 0%, transparent 70%),
                linear-gradient(rgba(94, 176, 249, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(94, 176, 249, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(22, 25, 31, 0.8);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 12px 64px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: var(--border-gradient);
            z-index: -1;
            border-radius: 26px;
            opacity: 0.3;
        }

        h1 {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--accent), #a3d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 10px 0 20px;
            color: var(--text);
        }

        p {
            color: var(--text3);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: var(--border-gradient);
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(94, 176, 249, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(94, 176, 249, 0.4);
            filter: brightness(1.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(224, 108, 117, 0.1);
            border: 1px solid rgba(224, 108, 117, 0.3);
            color: #e06c75;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Extinction Event</div>
        <h1>404</h1>
        <h2>Taxon Not Found</h2>
        <p>The branch you are looking for has been pruned from the tree of life... or perhaps it simply hasn't evolved yet.</p>
        <a href="https://cladeify.com" class="btn">Return to Root</a>
    </div>
</body>
</html>
